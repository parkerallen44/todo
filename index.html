<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="To Do">
<meta name="theme-color" content="#f7f3e9">
<title>To Do</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f7f3e9;
    --line: #e3dcc8;
    --ink: #2b2a26;
    --ink-faded: #b3ab96;
    --dot: #8a8270;
    --accent: #3a5a8c; /* ballpoint blue */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    background: var(--paper);
    /* faint paper grain */
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.015) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.02) 0, transparent 45%);
    color: var(--ink);
    font-family: 'Caveat', 'Bradley Hand', cursive;
    padding: calc(env(safe-area-inset-top) + 18px) 22px calc(env(safe-area-inset-bottom) + 90px) 22px;
    overscroll-behavior-y: contain;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 6px;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 34px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  #date {
    font-size: 20px;
    color: var(--dot);
  }

  ul { list-style: none; }

  li {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    font-size: 26px;
    line-height: 1.2;
    animation: settle 0.15s ease-out;
  }

  @keyframes settle {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    li { animation: none; }
  }

  .dot {
    flex: none;
    width: 26px;
    height: 26px;
    border: 2.5px solid var(--dot);
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
    position: relative;
    /* bigger touch target without bigger visual */
    box-shadow: 0 0 0 10px transparent;
  }

  .dot::after {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: var(--accent);
    transform: scale(0);
    transition: transform 0.12s ease-out;
  }

  li.done .dot::after { transform: scale(1); }
  li.done .dot { border-color: var(--accent); }

  .text {
    flex: 1;
    word-break: break-word;
    position: relative;
    transition: color 0.15s;
  }

  li.done .text { color: var(--ink-faded); }

  /* hand-drawn strike: slightly tilted line */
  li.done .text::after {
    content: '';
    position: absolute;
    left: -2px;
    right: -2px;
    top: 55%;
    height: 2px;
    background: var(--accent);
    opacity: 0.75;
    transform: rotate(-1.2deg);
  }

  .del {
    flex: none;
    border: none;
    background: none;
    color: var(--ink-faded);
    font-family: inherit;
    font-size: 22px;
    padding: 4px 8px;
    cursor: pointer;
  }

  #empty {
    text-align: center;
    color: var(--ink-faded);
    font-size: 24px;
    padding: 48px 0;
  }

  /* writing line pinned to bottom */
  #writeBar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    padding: 12px 22px calc(env(safe-area-inset-bottom) + 14px) 22px;
    background: var(--paper);
    border-top: 1px solid var(--line);
    display: flex;
    gap: 12px;
    align-items: center;
  }

  #newItem {
    flex: 1;
    border: none;
    border-bottom: 2px solid var(--ink);
    background: transparent;
    font-family: inherit;
    font-size: 26px;
    color: var(--ink);
    padding: 4px 2px;
    outline: none;
    caret-color: var(--accent);
  }

  #newItem::placeholder { color: var(--ink-faded); }

  #addBtn {
    border: 2px solid var(--ink);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    background: transparent;
    color: var(--ink);
    font-family: inherit;
    font-size: 30px;
    line-height: 1;
    cursor: pointer;
    flex: none;
  }
  #addBtn:active { background: var(--ink); color: var(--paper); }

  #clearDone {
    display: none;
    margin: 18px auto 0;
    border: none;
    background: none;
    font-family: inherit;
    font-size: 22px;
    color: var(--dot);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 4px;
  }
</style>
</head>
<body>

<header>
  <h1>To do</h1>
  <span id="date"></span>
</header>

<ul id="list"></ul>
<p id="empty">Nothing on the list. Enjoy it.</p>
<button id="clearDone">clear checked items</button>

<div id="writeBar">
  <input id="newItem" type="text" placeholder="Write something down…" autocomplete="off" enterkeyhint="done">
  <button id="addBtn" aria-label="Add item">+</button>
</div>

<script>
  const KEY = 'paper-todo-v1';
  let items = [];

  try { items = JSON.parse(localStorage.getItem(KEY)) || []; } catch (e) { items = []; }

  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const input = document.getElementById('newItem');
  const addBtn = document.getElementById('addBtn');
  const clearBtn = document.getElementById('clearDone');

  document.getElementById('date').textContent =
    new Date().toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(items)); } catch (e) {}
  }

  function render() {
    list.innerHTML = '';
    items.forEach((item, i) => {
      const li = document.createElement('li');
      if (item.done) li.classList.add('done');

      const dot = document.createElement('button');
      dot.className = 'dot';
      dot.setAttribute('aria-label', item.done ? 'Mark not done' : 'Mark done');
      dot.addEventListener('click', () => {
        item.done = !item.done;
        save();
        render();
      });

      const text = document.createElement('span');
      text.className = 'text';
      text.textContent = item.text;

      const del = document.createElement('button');
      del.className = 'del';
      del.textContent = '×';
      del.setAttribute('aria-label', 'Delete item');
      del.addEventListener('click', () => {
        items.splice(i, 1);
        save();
        render();
      });

      li.append(dot, text, del);
      list.appendChild(li);
    });

    empty.style.display = items.length ? 'none' : 'block';
    clearBtn.style.display = items.some(it => it.done) ? 'block' : 'none';
  }

  function addItem() {
    const text = input.value.trim();
    if (!text) return;
    items.push({ text, done: false });
    input.value = '';
    save();
    render();
  }

  addBtn.addEventListener('click', addItem);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
  clearBtn.addEventListener('click', () => {
    items = items.filter(it => !it.done);
    save();
    render();
  });

  render();
</script>
</body>
</html>
